services:
  postgres:
    image: postgres:16-alpine
    container_name: dash-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpass}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_avocado}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dashuser} -d ${POSTGRES_DB:-dashboard_avocado}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dash-api-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: production
    container_name: dash-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dashuser}:${POSTGRES_PASSWORD:-dashpass}@postgres:5432/${POSTGRES_DB:-dashboard_avocado}
      PORT: ${PORT:-5000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CORS_PUBLIC: ${CORS_PUBLIC:-false}
      APP_NAME: ${APP_NAME:-Dashboard Avocado Backend}
      APP_VERSION: ${APP_VERSION:-2.0.0}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-avocado-dashboard}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@avocadodashboard.com}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_SENDER_ID: ${AFRICASTALKING_SENDER_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '${PORT:-5000}:5000'
    # Run migrations before starting the server
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/server.js"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  postgres_data:
  minio_data:
